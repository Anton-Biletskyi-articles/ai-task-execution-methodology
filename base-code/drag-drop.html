<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag & Drop Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="drop-zone" id="zone-1">
            <h3>Source Zone</h3>
            <div class="draggable" draggable="true" id="item-1">Item 1</div>
            <div class="draggable" draggable="true" id="item-2">Item 2</div>
            <div class="draggable" draggable="true" id="item-3">Item 3</div>
        </div>

        <div class="drop-zone" id="zone-2">
            <h3>Target Zone</h3>
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
